name: Publish docs

on:
  push:
    branches: [main, 'v*.*']
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: pages-${{ github.ref }}
  cancel-in-progress: true

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Validate registry against markdown
        run: node scripts/build-registry.mjs
      - name: Stage docs content
        # Exclude repo internals so they don't end up on the Pages site.
        run: |
          mkdir -p _site
          rsync -a \
            --exclude='_site' \
            --exclude='.github' \
            --exclude='node_modules' \
            --exclude='.git' \
            --exclude='scripts' \
            --exclude='package.json' \
            ./ _site/
      - name: Deploy to gh-pages (versioned path)
        # Each branch writes to its own subdirectory of the persistent
        # gh-pages branch. keep_files preserves other versions' directories
        # so v0.3/ and v0.4/ coexist without clobbering each other.
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./_site
          destination_dir: ${{ github.ref_name }}
          keep_files: true
